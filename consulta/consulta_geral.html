<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Consulta Geral — Dark Epoch</title>
<link rel="stylesheet" href="../assets/css/style.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script defer src="../js/script.js?v=2025-11-05"></script>
<style>
.btn-regras {
  display: inline-block;
  margin-bottom: 24px;
  padding: 10px 24px;
  background: transparent;
  color: #00ffd5;
  border: 1px solid #00ffd5;
  border-radius: 8px;
  font-size: 0.95rem;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.2s, color 0.2s;
}
.btn-regras:hover { background: #00ffd5; color: #0f0f0f; }

/* Grid de botões das listas */
.grid-botoes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}

.btn-lista {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  background: #0f0f0f;
  color: #00ffd5;
  border: 1px solid #00ffd5;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  cursor: pointer;
  transition: background 0.2s, color 0.2s, box-shadow 0.2s;
  user-select: none;
}
.btn-lista:hover {
  background: #00ffd5;
  color: #0f0f0f;
  box-shadow: 0 0 14px rgba(0,255,213,0.3);
}
.btn-lista.ativo {
  background: #00ffd5;
  color: #0f0f0f;
  box-shadow: 0 0 14px rgba(0,255,213,0.3);
}
.btn-lista .seta {
  font-size: 0.75rem;
  transition: transform 0.25s;
}
.btn-lista.ativo .seta {
  transform: rotate(180deg);
}

/* Painel colapsável */
.painel-lista {
  display: none;
  background: #0a0a0a;
  border: 1px solid #00ffd533;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  animation: fadeDown 0.2s ease;
}
.painel-lista.aberto { display: block; }

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.painel-lista h3 {
  margin: 0 0 10px;
  text-align: center;
  color: #00ffd5;
  letter-spacing: 2px;
}

.painel-lista table {
  width: 100%;
  border-collapse: collapse;
}
.painel-lista table th,
.painel-lista table td {
  padding: 6px 10px;
  text-align: left;
  border-bottom: 1px solid #1a1a1a;
  font-size: 0.9rem;
}
.painel-lista table th { color: #00ffd5; }
</style>

<script>
window.addEventListener('DOMContentLoaded', ()=>{
  if (!firebase.apps.length) return alert("Firebase não inicializado.");
  window.db = firebase.firestore();
  escutarListaConsulta('coc',   'th_coc',   'tb_coc');
  escutarListaConsulta('alma',  'th_alma',  'tb_alma');
  escutarListaConsulta('bau',   'th_bau',   'tb_bau');
  escutarListaConsulta('chama', 'th_chama', 'tb_chama');
  escutarListaConsulta('pena',  'th_pena',  'tb_pena');
});

function toggleLista(id) {
  const painel = document.getElementById('painel_' + id);
  const btn    = document.getElementById('btn_' + id);
  const aberto = painel.classList.contains('aberto');

  // Fecha todos
  document.querySelectorAll('.painel-lista').forEach(p => p.classList.remove('aberto'));
  document.querySelectorAll('.btn-lista').forEach(b => b.classList.remove('ativo'));

  // Abre o clicado (se estava fechado)
  if (!aberto) {
    painel.classList.add('aberto');
    btn.classList.add('ativo');
  }
}
</script>
</head>
<body>
  <div class="container">
    <h1>Consulta Geral</h1>

    <a href="regras.html" class="btn-regras">📋 Regras</a>

    <!-- Botões das listas -->
    <div class="grid-botoes">
      <button id="btn_coc"   class="btn-lista" onclick="toggleLista('coc')">  COC        <span class="seta">▼</span></button>
      <button id="btn_alma"  class="btn-lista" onclick="toggleLista('alma')"> ALMA       <span class="seta">▼</span></button>
      <button id="btn_bau"   class="btn-lista" onclick="toggleLista('bau')">  BAU CERCO  <span class="seta">▼</span></button>
      <button id="btn_chama" class="btn-lista" onclick="toggleLista('chama')">CHAMA      <span class="seta">▼</span></button>
      <button id="btn_pena"  class="btn-lista" onclick="toggleLista('pena')"> PENA       <span class="seta">▼</span></button>
    </div>

    <!-- Painéis colapsáveis -->
    <div id="painel_coc"   class="painel-lista"><h3>COC</h3>  <table><thead id="th_coc"></thead>  <tbody id="tb_coc"></tbody>  </table></div>
    <div id="painel_alma"  class="painel-lista"><h3>ALMA</h3> <table><thead id="th_alma"></thead> <tbody id="tb_alma"></tbody> </table></div>
    <div id="painel_bau"   class="painel-lista"><h3>BAU DO CERCO</h3><table><thead id="th_bau"></thead>  <tbody id="tb_bau"></tbody>  </table></div>
    <div id="painel_chama" class="painel-lista"><h3>CHAMA</h3><table><thead id="th_chama"></thead><tbody id="tb_chama"></tbody></table></div>
    <div id="painel_pena"  class="painel-lista"><h3>PENA</h3> <table><thead id="th_pena"></thead> <tbody id="tb_pena"></tbody> </table></div>

  </div>
</body>
</html>
